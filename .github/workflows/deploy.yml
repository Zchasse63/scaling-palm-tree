name: Deploy to Netlify

# Builds + deploys to `servous-container-builder` (a4ebac53-...) on every
# push to main.
#
# Required repo secrets:
#   NETLIFY_AUTH_TOKEN  — PAT from app.netlify.com → User settings → Apps
#   NETLIFY_USER_ID     — from ~/Library/Preferences/netlify/config.json
#   NETLIFY_USER_EMAIL  — same source
#   NETLIFY_USER_NAME   — same source
#   NETLIFY_SITE_ID     — a4ebac53-5df6-4b54-8867-9fc7abd8205d
#
# Build env vars (NEXT_PUBLIC_SUPABASE_URL etc.) are pulled from Netlify
# Site Settings by @netlify/build during `--build`, so they don't need to
# be GitHub secrets.
#
# Why we synthesize a config file: token-only env-var auth lacks the
# "extensions" scope in some CI contexts. Reads from ~/.config/netlify/
# config.json restore the full session shape and dodge the 403.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Synthesize Netlify CLI session config
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_USER_ID: ${{ secrets.NETLIFY_USER_ID }}
          NETLIFY_USER_EMAIL: ${{ secrets.NETLIFY_USER_EMAIL }}
          NETLIFY_USER_NAME: ${{ secrets.NETLIFY_USER_NAME }}
        run: |
          mkdir -p "$HOME/.config/netlify"
          cat > "$HOME/.config/netlify/config.json" <<EOF
          {
            "telemetryDisabled": true,
            "userId": "$NETLIFY_USER_ID",
            "users": {
              "$NETLIFY_USER_ID": {
                "id": "$NETLIFY_USER_ID",
                "name": "$NETLIFY_USER_NAME",
                "email": "$NETLIFY_USER_EMAIL",
                "auth": {
                  "token": "$NETLIFY_AUTH_TOKEN",
                  "github": {}
                }
              }
            }
          }
          EOF
          chmod 600 "$HOME/.config/netlify/config.json"

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Netlify (build + deploy)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npx -y netlify-cli@23.13.5 deploy \
            --prod \
            --build \
            --site="$NETLIFY_SITE_ID" \
            --message="GH Action $GITHUB_SHA"
